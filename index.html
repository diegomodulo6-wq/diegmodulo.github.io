<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reducción de Matrices 3x4_REV_JAURE</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        margin: 0;
        padding: 20px;
    }

    h1{
        text-align: center;
        margin-bottom: 10px;
    }

    .container{
        max-width: 1000px;
        margin: auto;
    }

    .matrix{
        display: grid;
        grid-template-columns: repeat(4, 80px);
        gap: 10px;
        justify-content: center;
        margin: 20px 0;
    }

    input{
        width: 80px;
        height: 50px;
        text-align: center;
        font-size: 18px;
        border-radius: 10px;
        border: none;
        background: #1e293b;
        color: white;
    }

    button{
        display: block;
        margin: 20px auto;
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #38bdf8;
        color: black;
        font-weight: bold;
    }

    button:hover{
        background: #0ea5e9;
    }

    .steps{
        margin-top: 30px;
    }

    .step{
        background: #1e293b;
        padding: 15px;
        border-radius: 15px;
        margin-bottom: 20px;
    }

    .matrix-display{
        font-family: monospace;
        font-size: 20px;
        line-height: 1.8;
        overflow-x: auto;
    }

    .solution{
        background: #22c55e;
        color: black;
        padding: 20px;
        border-radius: 15px;
        font-size: 22px;
        text-align: center;
        font-weight: bold;
        margin-top: 20px;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Sistema de Ecuaciones 3x4_REV_JAURE_CORRECTO</h1>
    <p style="text-align:center;">
        Ingresa los valores de la matriz aumentada.
    </p>

    <div class="matrix">
        <!-- FILA 1 -->
        <input type="number" id="m00" placeholder="a11">
        <input type="number" id="m01" placeholder="a12">
        <input type="number" id="m02" placeholder="a13">
        <input type="number" id="m03" placeholder="R1">

        <!-- FILA 2 -->
        <input type="number" id="m10" placeholder="a21">
        <input type="number" id="m11" placeholder="a22">
        <input type="number" id="m12" placeholder="a23">
        <input type="number" id="m13" placeholder="R2">

        <!-- FILA 3 -->
        <input type="number" id="m20" placeholder="a31">
        <input type="number" id="m21" placeholder="a32">
        <input type="number" id="m22" placeholder="a33">
        <input type="number" id="m23" placeholder="R3">
    </div>

    <button onclick="resolver()">Resolver Matriz</button>

    <div class="steps" id="steps"></div>

</div>

<script>

function obtenerMatriz() {
    let matriz = [];

    for(let i = 0; i < 3; i++) {
        let fila = [];
        for(let j = 0; j < 4; j++) {
            let valor = parseFloat(document.getElementById(`m${i}${j}`).value) || 0;
            fila.push(valor);
        }
        matriz.push(fila);
    }

    return matriz;
}

function mostrarMatriz(matriz, titulo) {

    const steps = document.getElementById("steps");

    let html = `
        <div class="step">
            <h2>${titulo}</h2>
            <div class="matrix-display">
    `;

    for(let i = 0; i < matriz.length; i++) {
        html += "[ ";
        for(let j = 0; j < matriz[i].length; j++) {
            html += Number(matriz[i][j].toFixed(3)) + " ";
        }
        html += "]<br>";
    }

    html += `
            </div>
        </div>
    `;

    steps.innerHTML += html;
}

function resolver() {

    document.getElementById("steps").innerHTML = "";

    let m = obtenerMatriz();

    mostrarMatriz(m, "Matriz Inicial");

    // PASO 1
    let pivote1 = m[0][0];

    for(let j = 0; j < 4; j++) {
        m[0][j] /= pivote1;
    }

    mostrarMatriz(m, "R1 = R1 / pivote");

    // HACER CEROS DEBAJO
    let factor21 = m[1][0];

    for(let j = 0; j < 4; j++) {
        m[1][j] -= factor21 * m[0][j];
    }

    mostrarMatriz(m, "R2 = R2 - factor * R1");

    let factor31 = m[2][0];

    for(let j = 0; j < 4; j++) {
        m[2][j] -= factor31 * m[0][j];
    }

    mostrarMatriz(m, "R3 = R3 - factor * R1");

    // PASO 2
    let pivote2 = m[1][1];

    for(let j = 0; j < 4; j++) {
        m[1][j] /= pivote2;
    }

    mostrarMatriz(m, "R2 = R2 / pivote");

    // HACER CEROS ARRIBA Y ABAJO
    let factor12 = m[0][1];

    for(let j = 0; j < 4; j++) {
        m[0][j] -= factor12 * m[1][j];
    }

    mostrarMatriz(m, "R1 = R1 - factor * R2");

    let factor32 = m[2][1];

    for(let j = 0; j < 4; j++) {
        m[2][j] -= factor32 * m[1][j];
    }

    mostrarMatriz(m, "R3 = R3 - factor * R2");

    // PASO 3
    let pivote3 = m[2][2];

    for(let j = 0; j < 4; j++) {
        m[2][j] /= pivote3;
    }

    mostrarMatriz(m, "R3 = R3 / pivote");

    // HACER CEROS ARRIBA
    let factor13 = m[0][2];

    for(let j = 0; j < 4; j++) {
        m[0][j] -= factor13 * m[2][j];
    }

    mostrarMatriz(m, "R1 = R1 - factor * R3");

    let factor23 = m[1][2];

    for(let j = 0; j < 4; j++) {
        m[1][j] -= factor23 * m[2][j];
    }

    mostrarMatriz(m, "R2 = R2 - factor * R3");

    // RESULTADOS
    let x = m[0][3];
    let y = m[1][3];
    let z = m[2][3];

    document.getElementById("steps").innerHTML += `
        <div class="solution">
            Solución Final:<br><br>
            a = ${x.toFixed(3)}<br>
            b = ${y.toFixed(3)}<br>
            c = ${z.toFixed(3)}
        </div>
    `;
}

</script>

</body>
</html>
